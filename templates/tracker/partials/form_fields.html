{% for field in form %}
    <div class="mb-3">
        <label class="form-label fw-semibold" for="{{ field.id_for_label }}">{{ field.label }}</label>
        {{ field }}
        {% if field.help_text %}
            <div class="form-text">{{ field.help_text }}</div>
        {% endif %}
        {% if field.errors %}
            <div class="text-danger small mt-1" role="alert">{{ field.errors|join:', ' }}</div>
        {% endif %}
    </div>
{% endfor %}
{% if form.non_field_errors %}
    <div class="alert alert-danger" role="alert">{{ form.non_field_errors|join:', ' }}</div>
{% endif %}
